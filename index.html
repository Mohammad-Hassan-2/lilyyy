<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lily Bouquet</title>
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(160deg, #f9ece4 0%, #f7d9e3 40%, #e8d5f0 75%, #d6e8f7 100%);
    font-family: sans-serif;
  }

  /* ── Scene ── */
  .scene {
    position: relative;
    width: min(520px, 96vw);
    height: min(680px, 94vh);
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }



  /* ── Particles ── */
  .particle {
    position: fixed;
    border-radius: 50% 40% 50% 40%;
    pointer-events: none;
    animation: drift linear infinite;
    opacity: 0;
  }
  @keyframes drift {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(105vh) rotate(540deg); opacity: 0; }
  }

  /* ── Bouquet container ── */
  .bouquet {
    position: relative;
    width: 320px;
    height: 580px;
    cursor: pointer;
    transition: transform 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  .bouquet:hover { transform: scale(1.03) translateY(-6px); }
  .bouquet.expanded { transform: scale(1.07) translateY(-14px); }

  /* ── Wrapping paper ── */
  .wrap {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 210px;
    background: linear-gradient(170deg,
      #f5e6c8 0%, #f0d9a8 30%, #e8ca84 60%, #f5e6c8 100%);
    clip-path: polygon(18% 0%, 82% 0%, 100% 100%, 0% 100%);
    border-radius: 0 0 12px 12px;
    box-shadow: inset 0 -8px 24px rgba(180,140,60,0.18),
                inset 4px 0 12px rgba(255,255,255,0.25),
                0 8px 30px rgba(140,100,40,0.22);
    overflow: hidden;
  }
  /* kraft-paper texture lines */
  .wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      95deg,
      transparent 0px,
      transparent 14px,
      rgba(180,140,60,0.13) 14px,
      rgba(180,140,60,0.13) 15px
    );
  }
  .wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      175deg,
      transparent 0px,
      transparent 22px,
      rgba(255,255,255,0.12) 22px,
      rgba(255,255,255,0.12) 23px
    );
  }

  /* ── Ribbon ── */
  .ribbon {
    position: absolute;
    bottom: 195px;
    left: 50%;
    transform: translateX(-50%);
    width: 170px;
    height: 18px;
    background: linear-gradient(90deg, #e8a0c0, #f4c0d6, #e8a0c0);
    border-radius: 3px;
    box-shadow: 0 2px 8px rgba(200,100,150,0.3);
    z-index: 20;
  }
  /* bow loops */
  .ribbon::before,
  .ribbon::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 52px;
    height: 38px;
    background: linear-gradient(135deg, #f4c0d6, #e090b8);
    border-radius: 50% 50% 50% 0;
    box-shadow: inset 0 2px 8px rgba(255,255,255,0.4), 0 2px 6px rgba(180,80,130,0.25);
    transform-origin: right center;
  }
  .ribbon::before {
    right: calc(50% + 2px);
    transform: translateY(-50%) rotate(-35deg);
    border-radius: 50% 0 50% 50%;
  }
  .ribbon::after {
    left: calc(50% + 2px);
    transform: translateY(-50%) rotate(35deg);
    border-radius: 0 50% 50% 50%;
  }
  /* bow knot */
  .ribbon-knot {
    position: absolute;
    bottom: 203px;
    left: 50%;
    transform: translateX(-50%);
    width: 22px;
    height: 22px;
    background: radial-gradient(circle, #f8d0e4, #e090b8);
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(180,80,130,0.35);
    z-index: 21;
  }

  /* ── Stems ── */
  .stem {
    position: absolute;
    bottom: 205px;
    transform-origin: bottom center;
    z-index: 2;
  }
  .stem-body {
    width: 5px;
    background: linear-gradient(90deg, #5a8c3e, #7ab854, #5a8c3e);
    border-radius: 3px;
    box-shadow: 1px 0 3px rgba(0,0,0,0.12);
  }

  /* ── Leaves ── */
  .leaf {
    position: absolute;
    width: 44px;
    height: 18px;
    border-radius: 50% 50% 50% 0;
    background: linear-gradient(135deg, #7ab854, #5a8c3e 60%, #4a7c2e);
    box-shadow: inset 0 1px 4px rgba(255,255,255,0.2), 0 1px 4px rgba(0,0,0,0.1);
    transform-origin: left center;
  }
  .leaf::after {
    content: '';
    position: absolute;
    left: 4px; top: 50%;
    width: calc(100% - 8px);
    height: 1px;
    background: rgba(255,255,255,0.3);
    transform: translateY(-50%) rotate(-4deg);
  }
  .leaf.right {
    border-radius: 50% 50% 0 50%;
    transform-origin: right center;
  }

  /* ── Lily flower ── */
  .lily {
    position: absolute;
    transform-origin: center bottom;
    z-index: 10;
    transition: filter 0.3s;
    animation: sway 4s ease-in-out infinite;
  }
  .lily:hover { filter: brightness(1.12) drop-shadow(0 0 14px rgba(255,200,230,0.8)); }
  @keyframes sway {
    0%,100% { transform: rotate(var(--base-rot)) translateY(0px); }
    50%      { transform: rotate(calc(var(--base-rot) + var(--sway-dir) * 2.5deg)) translateY(-4px); }
  }

  /* flower SVG host */
  .lily svg {
    overflow: visible;
    animation: bloom 1.2s cubic-bezier(.34,1.3,.64,1) both;
    animation-delay: var(--bloom-delay, 0s);
  }
  @keyframes bloom {
    from { transform: scale(0.1); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
</style>
</head>
<body>

<div class="scene">

  <div class="bouquet" id="bouquet">
    <!-- stems, leaves, flowers generated by JS -->
    <div class="wrap"></div>
    <div class="ribbon"></div>
    <div class="ribbon-knot"></div>
  </div>
</div>

<script>
/* ================================================================
   LILY BOUQUET — dynamic generator
   ================================================================ */

const bouquet = document.getElementById('bouquet');

/* ── Palette ── */
const palettes = [
  // [petal-tip, petal-base, stamen-ring, freckle]
  ['#ffffff','#ffd6e8','#fff0b2','#c96080'],  // white-pink
  ['#f9d0f0','#e8a0d8','#fff0b2','#a04080'],  // lavender-pink
  ['#ffeaf5','#ffc8e0','#fff0b2','#d0608a'],  // blush
  ['#f0d8f8','#d8a8f0','#fff0b2','#8850b0'],  // lilac
  ['#fff4e0','#ffdca0','#fff0b2','#c07028'],  // cream-peach
  ['#e8f4ff','#b8d8ff','#fff0b2','#4878b0'],  // icy blue
];

/* ── Flower data — position within bouquet area ── */
const flowerConfig = [
  // [x%, bottomPx, stemH, baseRot, swayDir, scale, paletteIdx, delay]
  [50, 310,  80, -2,  1, 1.10, 0, 0.0],  // center-top
  [32, 285,  65, -14, -1,0.95, 1, 0.12],  // left-mid
  [68, 285,  65,  14, 1, 0.95, 2, 0.18],  // right-mid
  [20, 260,  50, -22, -1,0.88, 3, 0.24],  // far left
  [80, 260,  50,  22, 1, 0.88, 4, 0.30],  // far right
  [42, 340,  95, -6,  -1,1.0,  5, 0.08],  // back-left
  [58, 340,  95,  6,  1, 1.0,  0, 0.14],  // back-right
  [24, 300,  58, -18, -1,0.82, 2, 0.36],  // outer left
  [76, 300,  58,  18, 1, 0.82, 3, 0.40],  // outer right
];

/* ── Build a lily SVG ── */
function makeLilySVG(palette, scale) {
  const [tipColor, baseColor, stamColor, freckColor] = palette;
  const r = 54 * scale;  // petal length radius
  const cx = 70, cy = 70;
  const petalCount = 6;
  const petalW = 22 * scale;

  let petals = '';
  let stamens = '';
  let freckles = '';

  for (let i = 0; i < petalCount; i++) {
    const angle = (i / petalCount) * 360;
    const rad = (angle - 90) * Math.PI / 180;
    // slight alternating tilt for layered look
    const tiltFactor = (i % 2 === 0) ? 0.92 : 1.0;
    const px = cx + Math.cos(rad) * r * tiltFactor;
    const py = cy + Math.sin(rad) * r * tiltFactor;

    // control points for curved petal
    const perpRad = rad + Math.PI / 2;
    const c1x = cx + Math.cos(rad) * r * 0.35 + Math.cos(perpRad) * petalW * 0.9;
    const c1y = cy + Math.sin(rad) * r * 0.35 + Math.sin(perpRad) * petalW * 0.9;
    const c2x = cx + Math.cos(rad) * r * 0.75 + Math.cos(perpRad) * petalW * 0.6;
    const c2y = cy + Math.sin(rad) * r * 0.75 + Math.sin(perpRad) * petalW * 0.6;
    const c3x = cx + Math.cos(rad) * r * 0.35 - Math.cos(perpRad) * petalW * 0.9;
    const c3y = cy + Math.sin(rad) * r * 0.35 - Math.sin(perpRad) * petalW * 0.9;
    const c4x = cx + Math.cos(rad) * r * 0.75 - Math.cos(perpRad) * petalW * 0.6;
    const c4y = cy + Math.sin(rad) * r * 0.75 - Math.sin(perpRad) * petalW * 0.6;

    const gradId = `pg${Math.random().toString(36).slice(2,6)}`;
    const petalPath = `M${cx},${cy} C${c1x},${c1y} ${c2x},${c2y} ${px},${py} C${c4x},${c4y} ${c3x},${c3y} ${cx},${cy}Z`;

    petals += `
      <defs>
        <radialGradient id="${gradId}" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="${tipColor}" stop-opacity="1"/>
          <stop offset="55%" stop-color="${baseColor}" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="${baseColor}" stop-opacity="0.85"/>
        </radialGradient>
      </defs>
      <path d="${petalPath}"
            fill="url(#${gradId})"
            stroke="${baseColor}"
            stroke-width="0.6"
            opacity="${i % 2 === 0 ? 0.96 : 1}"/>`;

    // freckles on inner petal area
    for (let f = 0; f < 4; f++) {
      const fd = 0.2 + Math.random() * 0.35;
      const fx = cx + Math.cos(rad) * r * fd + (Math.random()-0.5)*10;
      const fy = cy + Math.sin(rad) * r * fd + (Math.random()-0.5)*10;
      freckles += `<circle cx="${fx}" cy="${fy}" r="${0.8+Math.random()*1.2}"
                    fill="${freckColor}" opacity="${0.25+Math.random()*0.35}"/>`;
    }
  }

  // stamens (6 filaments + anther tips)
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * 360;
    const aRad = (a - 90) * Math.PI / 180;
    const sx = cx + Math.cos(aRad) * 18 * scale;
    const sy = cy + Math.sin(aRad) * 18 * scale;
    const ax = cx + Math.cos(aRad) * 30 * scale;
    const ay = cy + Math.sin(aRad) * 30 * scale;
    stamens += `
      <line x1="${cx}" y1="${cy}" x2="${sx}" y2="${sy}"
            stroke="#c8a028" stroke-width="${1.4*scale}" stroke-linecap="round"/>
      <ellipse cx="${ax}" cy="${ay}"
               rx="${3.5*scale}" ry="${2*scale}"
               fill="#f5c842" stroke="#c8880a" stroke-width="0.5"
               transform="rotate(${a},${ax},${ay})"/>`;
  }

  // center disc
  const discId = `dc${Math.random().toString(36).slice(2,6)}`;
  const centerCircle = `
    <defs>
      <radialGradient id="${discId}" cx="40%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#fff8d0"/>
        <stop offset="100%" stop-color="#e8c040"/>
      </radialGradient>
    </defs>
    <circle cx="${cx}" cy="${cy}" r="${8*scale}"
            fill="url(#${discId})" stroke="#c8880a" stroke-width="0.6"/>`;

  return `<svg width="${cx*2}" height="${cy*2}" viewBox="0 0 ${cx*2} ${cy*2}"
              xmlns="http://www.w3.org/2000/svg" overflow="visible">
    ${petals}${freckles}${stamens}${centerCircle}
  </svg>`;
}

/* ── Build leaf element ── */
function makeLeaf(side, yOff, rotation) {
  const el = document.createElement('div');
  el.className = `leaf${side === 'right' ? ' right' : ''}`;
  el.style.cssText = `
    top: ${yOff}px;
    ${side === 'left' ? 'right: -4px' : 'left: -4px'};
    transform: ${side === 'left'
      ? `scaleX(-1) rotate(${rotation}deg)`
      : `rotate(${rotation}deg)`};
    opacity: 0.9;
  `;
  return el;
}

/* ── Build stem + flower ── */
flowerConfig.forEach(([xPct, bottomPx, stemH, baseRot, swayDir, scale, palIdx, delay]) => {
  const palette = palettes[palIdx];
  const leftPx = (xPct / 100) * 320;

  /* stem */
  const stemEl = document.createElement('div');
  stemEl.className = 'stem';
  stemEl.style.cssText = `
    left: ${leftPx - 2}px;
    bottom: ${bottomPx - stemH}px;
    transform: rotate(${baseRot}deg);
  `;
  const stemBody = document.createElement('div');
  stemBody.className = 'stem-body';
  stemBody.style.height = `${stemH}px`;
  stemEl.appendChild(stemBody);

  /* leaf on stem */
  if (Math.abs(baseRot) > 6) {
    const side = baseRot < 0 ? 'right' : 'left';
    const lf = makeLeaf(side, stemH * 0.38, baseRot < 0 ? -35 : 35);
    stemEl.appendChild(lf);
  } else {
    stemEl.appendChild(makeLeaf('left',  stemH * 0.3, -40));
    stemEl.appendChild(makeLeaf('right', stemH * 0.55, 35));
  }

  bouquet.insertBefore(stemEl, bouquet.querySelector('.wrap'));

  /* flower */
  const lilyEl = document.createElement('div');
  lilyEl.className = 'lily';
  lilyEl.style.cssText = `
    left: ${leftPx - 70 * scale}px;
    bottom: ${bottomPx}px;
    --base-rot: ${baseRot}deg;
    --sway-dir: ${swayDir};
    animation-delay: ${(Math.random() * 2).toFixed(2)}s;
    animation-duration: ${(3.5 + Math.random() * 2).toFixed(2)}s;
  `;
  lilyEl.innerHTML = makeLilySVG(palette, scale);
  lilyEl.querySelector('svg').style.setProperty('--bloom-delay', `${delay}s`);
  lilyEl.querySelector('svg').style.animationDelay = `${delay}s`;

  bouquet.appendChild(lilyEl);
});

/* ── Click interaction: expand / contract ── */
let expanded = false;
bouquet.addEventListener('click', () => {
  expanded = !expanded;
  bouquet.classList.toggle('expanded', expanded);
  /* nudge sway amplitudes on expanded */
  document.querySelectorAll('.lily').forEach(l => {
    l.style.animationDuration = expanded
      ? `${(2 + Math.random()).toFixed(2)}s`
      : `${(3.5 + Math.random()*2).toFixed(2)}s`;
  });
});

/* ── Particle system ── */
const PARTICLE_COLORS = [
  '#ffd6e8','#f4c0d6','#e8d0f4','#d8eaff','#fff0c0','#fbe8f0'
];
function spawnParticle() {
  const el = document.createElement('div');
  el.className = 'particle';
  const size = 4 + Math.random() * 9;
  const color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
  el.style.cssText = `
    width: ${size}px;
    height: ${size * 0.65}px;
    left: ${Math.random() * 100}vw;
    top: -20px;
    background: ${color};
    animation-duration: ${6 + Math.random() * 8}s;
    animation-delay: ${Math.random() * 4}s;
    transform: rotate(${Math.random()*360}deg);
  `;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}
/* spawn a gentle stream */
setInterval(spawnParticle, 600);
for (let i = 0; i < 12; i++) spawnParticle(); // initial burst
</script>
</body>
</html>
